name: Deploy to GitHub Pages

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # The committed package-lock.json only records darwin-arm64 native
        # binaries, so npm (ci or install) omits the Linux builds of rollup /
        # esbuild / @tailwindcss/oxide / lightningcss. Removing the lockfile
        # forces a fresh resolution that pulls the runner-platform optionals.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Generate route types
        run: npx react-router typegen

      - name: Typecheck
        run: npx tsc -b

      - name: Build (Vite SPA, base=/BeyondSingleObject/)
        run: npx react-router build

      - name: Configure Pages
        # enablement: true forces the Pages build type to "workflow" each run,
        # so GitHub does NOT fall back to building Jekyll from the branch
        # (which would otherwise shadow this React build with the README).
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
